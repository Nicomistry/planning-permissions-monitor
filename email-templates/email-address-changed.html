<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin:0;padding:0;background-color:#0a0a0a;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#0a0a0a;padding:48px 16px;">
    <tr><td align="center">
      <table width="100%" cellpadding="0" cellspacing="0" style="max-width:440px;">
        <tr>
          <td align="center" style="padding-bottom:28px;">
            <span style="display:inline-block;background:rgba(0,208,132,0.1);border:1px solid rgba(0,208,132,0.25);border-radius:10px;width:34px;height:34px;line-height:34px;text-align:center;font-size:16px;color:#00d084;vertical-align:middle;">◎</span>
            <span style="display:inline-block;vertical-align:middle;margin-left:8px;font-size:15px;font-weight:700;color:#ffffff;letter-spacing:-0.3px;">PPM</span>
          </td>
        </tr>
        <tr>
          <td style="background:#111111;border:1px solid rgba(255,255,255,0.07);border-radius:18px;padding:40px 36px 36px;">
            <p style="margin:0 0 20px;font-size:28px;line-height:1;">📧</p>
            <p style="margin:0 0 10px;font-size:20px;font-weight:700;color:#ffffff;letter-spacing:-0.5px;line-height:1.3;">Email address changed</p>
            <p style="margin:0 0 24px;font-size:14px;color:#71717a;line-height:1.7;">The email address on your PPM account has been successfully updated to <span style="color:#a1a1aa;">{{ .Email }}</span>.</p>
            <div style="background:rgba(239,68,68,0.07);border:1px solid rgba(239,68,68,0.2);border-radius:10px;padding:14px 16px;">
              <p style="margin:0;font-size:13px;color:#fca5a5;line-height:1.6;">If you didn't make this change, contact support immediately as your account may be compromised.</p>
            </div>
          </td>
        </tr>
        <tr>
          <td align="center" style="padding-top:20px;">
            <p style="margin:0;font-size:11px;color:#3f3f46;">If this was you, no further action is needed.</p>
          </td>
        </tr>
      </table>
    </td></tr>
  </table>
</body>
</html>
