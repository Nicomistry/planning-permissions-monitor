<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — PPM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.iconify.design/iconify-icon/2.0.0/iconify-icon.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Geist', 'sans-serif'] },
          colors: { brand: { DEFAULT: '#00d084', dark: '#00a064', light: '#33e39f' } }
        }
      }
    }
  </script>
  <style>
    body { background-color: #0a0a0a; -webkit-font-smoothing: antialiased; }
    .input-field {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-field:focus {
      outline: none;
      border-color: #00d084;
      box-shadow: 0 0 0 3px rgba(0,208,132,0.12);
    }
    .bg-grid {
      background-size: 40px 40px;
      background-image:
        linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255,255,255,0.03) 1px, transparent 1px);
    }
  </style>
</head>
<body class="min-h-screen font-sans text-zinc-400 flex flex-col">

  <div class="fixed inset-0 -z-10 bg-grid"></div>
  <div class="fixed top-0 left-1/2 -translate-x-1/2 w-[30rem] h-[20rem] bg-brand/8 blur-[6rem] rounded-full -z-10 pointer-events-none"></div>

  <!-- Nav -->
  <nav class="h-14 border-b border-white/5 bg-[#0a0a0a]/80 backdrop-blur flex items-center px-6">
    <a href="/login.html" class="flex items-center gap-2">
      <div class="w-7 h-7 rounded-lg bg-brand/10 flex items-center justify-center">
        <iconify-icon icon="solar:radar-2-linear" class="w-4 h-4" style="color:#00d084;stroke-width:1.5;"></iconify-icon>
      </div>
      <span class="text-sm font-medium text-white tracking-tight">PPM</span>
    </a>
  </nav>

  <div class="flex-1 flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-sm">

      <!-- Request reset (step 1) -->
      <div id="stepRequest">
        <div class="text-center mb-8">
          <h1 class="text-2xl font-medium text-white tracking-tight mb-2">Reset your password</h1>
          <p class="text-sm text-zinc-500">Enter your email and we'll send you a reset link.</p>
        </div>
        <div style="background:rgba(17,17,17,0.9);border:1px solid rgba(255,255,255,0.08);" class="rounded-2xl p-6 backdrop-blur">
          <div id="requestMsg" class="hidden mb-4 text-sm px-4 py-2.5 rounded-lg border"></div>
          <form id="requestForm" onsubmit="handleRequest(event)" class="space-y-4">
            <div>
              <label class="block text-xs text-zinc-400 mb-1.5">Email address</label>
              <input type="email" id="resetEmail" required placeholder="you@company.com"
                class="input-field w-full rounded-lg px-3 py-2.5 text-sm text-white placeholder-zinc-600">
            </div>
            <button type="submit" id="requestBtn"
              class="w-full py-2.5 rounded-lg bg-brand text-black text-sm font-medium hover:bg-brand-light transition-colors flex items-center justify-center gap-2">
              <span id="requestBtnText">Send reset link</span>
              <span id="requestSpinner" class="hidden">
                <iconify-icon icon="svg-spinners:3-dots-fade" class="w-4 h-4" style="color:black;"></iconify-icon>
              </span>
            </button>
          </form>
        </div>
        <p class="text-center text-xs text-zinc-600 mt-6">
          <a href="/login.html" class="hover:text-zinc-400 transition-colors">← Back to sign in</a>
        </p>
      </div>

      <!-- Set new password (step 2 — after clicking email link) -->
      <div id="stepNewPassword" class="hidden">
        <div class="text-center mb-8">
          <h1 class="text-2xl font-medium text-white tracking-tight mb-2">Choose a new password</h1>
          <p class="text-sm text-zinc-500">Must be at least 8 characters.</p>
        </div>
        <div style="background:rgba(17,17,17,0.9);border:1px solid rgba(255,255,255,0.08);" class="rounded-2xl p-6 backdrop-blur">
          <div id="newPassMsg" class="hidden mb-4 text-sm px-4 py-2.5 rounded-lg border"></div>
          <form id="newPassForm" onsubmit="handleNewPassword(event)" class="space-y-4">
            <div>
              <label class="block text-xs text-zinc-400 mb-1.5">New password</label>
              <input type="password" id="newPassword" required placeholder="Min. 8 characters" minlength="8"
                class="input-field w-full rounded-lg px-3 py-2.5 text-sm text-white placeholder-zinc-600">
            </div>
            <div>
              <label class="block text-xs text-zinc-400 mb-1.5">Confirm password</label>
              <input type="password" id="confirmPassword" required placeholder="Repeat password" minlength="8"
                class="input-field w-full rounded-lg px-3 py-2.5 text-sm text-white placeholder-zinc-600">
            </div>
            <button type="submit" id="newPassBtn"
              class="w-full py-2.5 rounded-lg bg-brand text-black text-sm font-medium hover:bg-brand-light transition-colors flex items-center justify-center gap-2">
              <span id="newPassBtnText">Update password</span>
              <span id="newPassSpinner" class="hidden">
                <iconify-icon icon="svg-spinners:3-dots-fade" class="w-4 h-4" style="color:black;"></iconify-icon>
              </span>
            </button>
          </form>
        </div>
      </div>

    </div>
  </div>

  <script>
    const SUPABASE_URL  = 'https://sgnmbvwwdshttdbbspou.supabase.co';
    const SUPABASE_ANON = 'sb_publishable_1L8oo4V_-71yfr1MjWydZA_WXKmavjX';
    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

    // If Supabase redirects here with a recovery token, show the new password form
    sb.auth.onAuthStateChange((event) => {
      if (event === 'PASSWORD_RECOVERY') {
        document.getElementById('stepRequest').classList.add('hidden');
        document.getElementById('stepNewPassword').classList.remove('hidden');
      }
    });

    function showMsg(id, type, text) {
      const el = document.getElementById(id);
      el.className = type === 'success'
        ? 'mb-4 text-sm px-4 py-2.5 rounded-lg border border-brand/30 bg-brand/10 text-brand'
        : 'mb-4 text-sm px-4 py-2.5 rounded-lg border border-red-500/30 bg-red-500/10 text-red-400';
      el.textContent = text;
      el.classList.remove('hidden');
    }

    async function handleRequest(e) {
      e.preventDefault();
      const email = document.getElementById('resetEmail').value;
      const btn   = document.getElementById('requestBtn');
      const txt   = document.getElementById('requestBtnText');
      const spin  = document.getElementById('requestSpinner');
      btn.disabled = true; txt.textContent = 'Sending…'; spin.classList.remove('hidden');

      const { error } = await sb.auth.resetPasswordForEmail(email, {
        redirectTo: `${window.location.origin}/reset-password.html`,
      });

      btn.disabled = false; txt.textContent = 'Send reset link'; spin.classList.add('hidden');

      if (error) {
        showMsg('requestMsg', 'error', error.message);
      } else {
        showMsg('requestMsg', 'success', 'Check your inbox — a reset link is on its way.');
        document.getElementById('requestForm').reset();
      }
    }

    async function handleNewPassword(e) {
      e.preventDefault();
      const newPass     = document.getElementById('newPassword').value;
      const confirmPass = document.getElementById('confirmPassword').value;

      if (newPass !== confirmPass) {
        showMsg('newPassMsg', 'error', 'Passwords do not match.'); return;
      }

      const btn  = document.getElementById('newPassBtn');
      const txt  = document.getElementById('newPassBtnText');
      const spin = document.getElementById('newPassSpinner');
      btn.disabled = true; txt.textContent = 'Updating…'; spin.classList.remove('hidden');

      const { error } = await sb.auth.updateUser({ password: newPass });

      btn.disabled = false; txt.textContent = 'Update password'; spin.classList.add('hidden');

      if (error) {
        showMsg('newPassMsg', 'error', error.message);
      } else {
        showMsg('newPassMsg', 'success', 'Password updated! Redirecting to sign in…');
        setTimeout(() => { window.location.href = '/login.html'; }, 2000);
      }
    }
  </script>

</body>
</html>
