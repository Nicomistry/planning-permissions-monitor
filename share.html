<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PPM Planning Leads Report</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { background:#0a0a0a; font-family:'Geist',system-ui,sans-serif; color:#f4f4f5; -webkit-font-smoothing:antialiased; }
    .glass { background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.08); border-radius:16px; }
    .badge-high   { background:rgba(74,222,128,0.15);  color:#4ade80; border:1px solid rgba(74,222,128,0.25);  font-size:9px; padding:2px 7px; border-radius:999px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; }
    .badge-medium { background:rgba(251,191,36,0.15);  color:#fbbf24; border:1px solid rgba(251,191,36,0.25);  font-size:9px; padding:2px 7px; border-radius:999px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; }
    .badge-low    { background:rgba(156,163,175,0.12); color:#9ca3af; border:1px solid rgba(156,163,175,0.2);   font-size:9px; padding:2px 7px; border-radius:999px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; }
    .lead-row { border-bottom:1px solid rgba(255,255,255,0.05); cursor:pointer; transition:background 0.15s; }
    .lead-row:last-child { border-bottom:none; }
    .lead-row:hover { background:rgba(255,255,255,0.02); }
    .lead-expand { display:none; }
    .lead-expand.open { display:block; }
    .chevron { transition:transform 0.2s; }
    .chevron.open { transform:rotate(180deg); }
    .council-section { margin-bottom:32px; }
    .score-high { color:#4ade80; }
    .score-med  { color:#fbbf24; }
    .score-low  { color:#9ca3af; }

  </style>
</head>
<body class="min-h-screen">

  <!-- Nav -->
  <header class="no-print border-b border-white/8 px-6 py-3.5 flex items-center justify-between flex-wrap gap-3 sticky top-0 z-10" style="background:rgba(10,10,10,0.95);backdrop-filter:blur(12px);">
    <div class="flex items-center gap-3">
      <div class="w-7 h-7 rounded-lg flex items-center justify-center flex-shrink-0" style="background:rgba(0,208,132,0.1);border:1px solid rgba(0,208,132,0.2);">
        <iconify-icon icon="solar:radar-2-linear" style="color:#00d084;font-size:14px;"></iconify-icon>
      </div>
      <span class="font-semibold text-sm tracking-tight text-white">PPM Planning Leads</span>
    </div>
    <div class="flex items-center gap-3">
      <div id="expiryBadge" class="text-[11px] text-amber-400 border border-amber-500/25 bg-amber-500/8 rounded-lg px-3 py-1.5 flex items-center gap-1.5 hidden"></div>
      <button id="pdfBtn" onclick="downloadPDF()"
        class="flex items-center gap-2 text-xs font-semibold px-4 py-2 rounded-lg text-black hover:opacity-90 transition-all active:scale-95"
        style="background:#00d084;">
        <iconify-icon icon="solar:file-download-bold" style="font-size:13px;"></iconify-icon>
        Download PDF
      </button>
    </div>
  </header>


  <!-- Main -->
  <main class="max-w-4xl mx-auto px-4 sm:px-6 py-8" id="mainContent">

    <!-- Loading -->
    <div id="stateLoading" class="flex flex-col items-center justify-center py-24 gap-4">
      <iconify-icon icon="svg-spinners:3-dots-fade" style="color:#00d084;font-size:32px;"></iconify-icon>
      <p class="text-zinc-500 text-sm">Loading report…</p>
    </div>

    <!-- Expired -->
    <div id="stateExpired" class="hidden flex-col items-center justify-center py-24 gap-4 text-center">
      <iconify-icon icon="solar:clock-circle-bold" style="color:#f59e0b;font-size:40px;"></iconify-icon>
      <h2 class="text-white font-semibold text-lg">This report has expired</h2>
      <p class="text-zinc-500 text-sm max-w-xs">Planning lead reports are available for 48 hours. Contact your PPM account manager for a fresh report.</p>
    </div>

    <!-- Not found -->
    <div id="stateNotFound" class="hidden flex-col items-center justify-center py-24 gap-4 text-center">
      <iconify-icon icon="solar:danger-triangle-bold" style="color:#f87171;font-size:40px;"></iconify-icon>
      <h2 class="text-white font-semibold text-lg">Report not found</h2>
      <p class="text-zinc-500 text-sm max-w-xs">This link is invalid or has been removed.</p>
    </div>

    <!-- Report -->
    <div id="stateReport" class="hidden">

      <!-- Title + stats -->
      <div class="mb-8">
        <h1 class="text-2xl font-bold text-white tracking-tight mb-1" id="reportTitle">Planning Leads Report</h1>
        <p class="text-sm text-zinc-500" id="reportMeta"></p>
        <div class="flex flex-wrap gap-3 mt-4">
          <div class="glass px-4 py-3 text-center min-w-[80px]">
            <div class="text-2xl font-bold" style="color:#00d084;" id="statTotal">—</div>
            <div class="text-[10px] text-zinc-500 mt-0.5 uppercase tracking-wide">Total leads</div>
          </div>
          <div class="glass px-4 py-3 text-center min-w-[80px]">
            <div class="text-2xl font-bold text-green-400" id="statHigh">—</div>
            <div class="text-[10px] text-zinc-500 mt-0.5 uppercase tracking-wide">High priority</div>
          </div>
          <div class="glass px-4 py-3 text-center min-w-[80px]">
            <div class="text-2xl font-bold text-yellow-400" id="statMed">—</div>
            <div class="text-[10px] text-zinc-500 mt-0.5 uppercase tracking-wide">Medium</div>
          </div>
          <div class="glass px-4 py-3 text-center min-w-[80px]">
            <div class="text-2xl font-bold text-zinc-400" id="statCouncils">—</div>
            <div class="text-[10px] text-zinc-500 mt-0.5 uppercase tracking-wide">Councils</div>
          </div>
        </div>
      </div>

      <!-- Per-council sections -->
      <div id="councilSections"></div>

    </div>
  </main>

  <script>
    function esc(s) {
      return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function badgeClass(p) {
      return p === 'HIGH' ? 'badge-high' : p === 'MEDIUM' ? 'badge-medium' : 'badge-low';
    }
    function scoreClass(s) {
      return s >= 8 ? 'score-high' : s >= 5 ? 'score-med' : 'score-low';
    }

    function show(id) {
      ['stateLoading','stateExpired','stateNotFound','stateReport'].forEach(s => {
        const el = document.getElementById(s);
        if (!el) return;
        el.classList.toggle('hidden', s !== id);
        if (s !== 'stateReport') el.classList.toggle('flex', s === id);
      });
    }

    function toggleLead(id) {
      const body    = document.getElementById('lx-' + id);
      const chevron = document.getElementById('lc-' + id);
      if (!body) return;
      body.classList.toggle('open');
      chevron?.classList.toggle('open');
    }

    function renderCouncilSection(council, leads) {
      const high   = leads.filter(l => l.priority === 'HIGH').length;
      const med    = leads.filter(l => l.priority === 'MEDIUM').length;
      const low    = leads.filter(l => l.priority === 'LOW').length;
      const avgScore = leads.length
        ? (leads.reduce((s, l) => s + (l.score ?? l.opportunity_score ?? 0), 0) / leads.length).toFixed(1)
        : '—';

      const leadsHtml = leads.map((l, i) => {
        const id      = council + '-' + i;
        const score   = l.score ?? l.opportunity_score ?? '—';
        const desc    = l.description || '';
        const shortDesc = desc.length > 120 ? desc.slice(0, 120) + '…' : desc;
        const daysLeft = l.target_decision_date
          ? Math.ceil((new Date(l.target_decision_date) - new Date()) / 86400000) : null;
        const urgency = daysLeft === null ? '' : daysLeft < 0
          ? `<span style="color:#f87171;font-size:10px;">${Math.abs(daysLeft)}d overdue</span>`
          : daysLeft <= 14
          ? `<span style="color:#fbbf24;font-size:10px;">${daysLeft}d left</span>`
          : `<span style="color:#52525b;font-size:10px;">${daysLeft}d left</span>`;

        return `
          <div class="lead-row px-5 py-4" onclick="toggleLead('${id}')">
            <div class="flex items-start gap-3">
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2 flex-wrap mb-1">
                  <span class="${badgeClass(l.priority || 'LOW')}">${esc(l.priority || 'LOW')}</span>
                  ${l.app_type ? `<span class="text-[11px] text-zinc-500">${esc(l.app_type)}</span>` : ''}
                  ${urgency}
                </div>
                <div class="text-sm font-semibold text-white leading-snug">${esc(l.address || '—')}</div>
                <div class="text-[11px] text-zinc-500 mt-1 leading-relaxed">${esc(shortDesc)}</div>
              </div>
              <div class="flex flex-col items-end gap-1.5 flex-shrink-0">
                <div class="text-lg font-bold ${scoreClass(score)}">${esc(score)}<span class="text-xs text-zinc-600 font-normal">/10</span></div>
                ${l.start_date ? `<div class="text-[10px] text-zinc-600 font-mono">${esc(l.start_date)}</div>` : ''}
                <iconify-icon id="lc-${id}" icon="solar:alt-arrow-down-linear" class="chevron no-print" style="font-size:13px;color:#52525b;"></iconify-icon>
              </div>
            </div>
            <!-- Expanded detail -->
            <div id="lx-${id}" class="lead-expand mt-4 pt-4 border-t border-white/5">
              <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 text-xs">
                ${desc ? `<div class="sm:col-span-2"><div class="text-zinc-500 mb-1 uppercase tracking-wide text-[10px]">Full Description</div><div class="text-zinc-300 leading-relaxed">${esc(desc)}</div></div>` : ''}
                ${l.applicant_name ? `<div><div class="text-zinc-500 mb-1 uppercase tracking-wide text-[10px]">Applicant</div><div class="text-white font-medium">${esc(l.applicant_name)}</div>${l.applicant_address ? `<div class="text-zinc-500 mt-0.5 text-[11px] leading-relaxed">${esc(l.applicant_address)}</div>` : ''}</div>` : ''}
                ${l.agent_name ? `<div><div class="text-zinc-500 mb-1 uppercase tracking-wide text-[10px]">Agent / Architect</div><div class="text-white font-medium">${esc(l.agent_name)}</div>${l.agent_email ? `<div class="text-blue-400 text-[11px] mt-0.5">${esc(l.agent_email)}</div>` : ''}${l.agent_phone ? `<div style="color:#00d084;" class="text-[11px] mt-0.5">${esc(l.agent_phone)}</div>` : ''}</div>` : ''}
                ${l.app_state ? `<div><div class="text-zinc-500 mb-1 uppercase tracking-wide text-[10px]">Status</div><div class="text-zinc-300">${esc(l.app_state)}</div></div>` : ''}
                ${l.postcode  ? `<div><div class="text-zinc-500 mb-1 uppercase tracking-wide text-[10px]">Postcode</div><div class="text-zinc-300 font-mono">${esc(l.postcode)}</div></div>` : ''}
                ${l.uid       ? `<div><div class="text-zinc-500 mb-1 uppercase tracking-wide text-[10px]">Reference</div><div class="text-zinc-400 font-mono text-[11px]">${esc(l.uid)}</div></div>` : ''}
                ${l.ward_name ? `<div><div class="text-zinc-500 mb-1 uppercase tracking-wide text-[10px]">Ward</div><div class="text-zinc-300">${esc(l.ward_name)}</div></div>` : ''}
              </div>
              ${(l.council_url || l.planit_url) ? `<a href="${esc(l.council_url || l.planit_url)}" target="_blank" rel="noopener" class="no-print inline-flex items-center gap-1.5 mt-3 text-[11px] font-semibold hover:underline" style="color:#00d084;"><iconify-icon icon="solar:arrow-right-up-bold" style="font-size:11px;"></iconify-icon>View Application</a>` : ''}
            </div>
          </div>`;
      }).join('');

      return `
        <div class="council-section">
          <!-- Council header -->
          <div class="flex items-center justify-between mb-3">
            <div>
              <h2 class="text-base font-bold text-white">${esc(council)}</h2>
              <div class="flex items-center gap-2 mt-1">
                ${high > 0 ? `<span class="badge-high">${high} HIGH</span>` : ''}
                ${med  > 0 ? `<span class="badge-medium">${med} MED</span>` : ''}
                ${low  > 0 ? `<span class="badge-low">${low} LOW</span>` : ''}
                <span class="text-[11px] text-zinc-600">${leads.length} total · avg score ${avgScore}</span>
              </div>
            </div>
          </div>
          <!-- Leads -->
          <div class="glass overflow-hidden">
            ${leadsHtml}
          </div>
        </div>`;
    }

    async function init() {
      const token = new URLSearchParams(location.search).get('t');
      if (!token) { show('stateNotFound'); return; }

      let data;
      try {
        const res = await fetch(`/api/get-report?token=${encodeURIComponent(token)}`);
        if (res.status === 410) { show('stateExpired'); return; }
        if (!res.ok) { show('stateNotFound'); return; }
        data = await res.json();
      } catch (err) {
        show('stateNotFound');
        return;
      }

      if (new Date(data.expires_at) < new Date()) { show('stateExpired'); return; }

      // Expiry badge
      const msLeft  = new Date(data.expires_at) - new Date();
      const hrsLeft = Math.floor(msLeft / 3600000);
      const minLeft = Math.floor((msLeft % 3600000) / 60000);
      const badge   = document.getElementById('expiryBadge');
      badge.innerHTML = `<iconify-icon icon="solar:clock-circle-linear" style="font-size:12px;"></iconify-icon> Expires in ${hrsLeft > 0 ? hrsLeft + 'h ' : ''}${minLeft}m`;
      badge.classList.remove('hidden');

      const leads = Array.isArray(data.leads_data) ? data.leads_data : [];
      if (leads.length === 0) { show('stateNotFound'); return; }
      window._reportLeads = leads;

      // Stats
      const councils = [...new Set(leads.map(l => l.council).filter(Boolean))].sort();
      document.getElementById('reportTitle').textContent =
        data.label || (councils.length === 1 ? `${councils[0]} Planning Leads` : 'Planning Leads Report');
      document.getElementById('reportMeta').textContent =
        `${leads.length} lead${leads.length !== 1 ? 's' : ''} across ${councils.length} council${councils.length !== 1 ? 's' : ''} · Generated ${new Date(data.created_at).toLocaleDateString('en-GB', { dateStyle: 'medium' })}`;
      document.getElementById('statTotal').textContent    = leads.length;
      document.getElementById('statHigh').textContent     = leads.filter(l => l.priority === 'HIGH').length;
      document.getElementById('statMed').textContent      = leads.filter(l => l.priority === 'MEDIUM').length;
      document.getElementById('statCouncils').textContent = councils.length;

      // Group by council, sort each group by score
      const byCouncil = {};
      leads.forEach(l => {
        const c = l.council || 'Unknown';
        if (!byCouncil[c]) byCouncil[c] = [];
        byCouncil[c].push(l);
      });
      councils.forEach(c => { byCouncil[c]?.sort((a, b) => (b.score ?? b.opportunity_score ?? 0) - (a.score ?? a.opportunity_score ?? 0)); });

      document.getElementById('councilSections').innerHTML =
        councils.map(c => renderCouncilSection(c, byCouncil[c] || [])).join('');

      show('stateReport');
    }

    function downloadPDF() {
      if (!window._reportLeads || window._reportLeads.length === 0) return;

      const btn = document.getElementById('pdfBtn');
      if (btn) { btn.textContent = 'Generating…'; btn.disabled = true; }

      try {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

        const W = 210; // A4 width mm
        const MARGIN = 14;
        const CONTENT_W = W - MARGIN * 2;
        const BRAND = [0, 208, 132];
        const BLACK = [10, 10, 10];
        const GREY  = [100, 100, 110];
        const LGREY = [220, 220, 224];

        let y = 0;

        function newPage() {
          doc.addPage();
          y = 14;
          // Page header stripe
          doc.setFillColor(...BRAND);
          doc.rect(0, 0, W, 8, 'F');
          doc.setFontSize(7);
          doc.setTextColor(0, 0, 0);
          doc.setFont('helvetica', 'bold');
          doc.text('PPM PLANNING LEADS', MARGIN, 5.5);
          const title = document.getElementById('reportTitle').textContent;
          doc.setFont('helvetica', 'normal');
          doc.text(title, W / 2, 5.5, { align: 'center' });
          doc.text(`pm-sand.vercel.app`, W - MARGIN, 5.5, { align: 'right' });
          y = 18;
        }

        function checkY(needed) {
          if (y + needed > 285) newPage();
        }

        // ── Cover / header ──────────────────────────────────────────
        // Green header bar
        doc.setFillColor(...BRAND);
        doc.rect(0, 0, W, 22, 'F');

        doc.setFont('helvetica', 'bold');
        doc.setFontSize(15);
        doc.setTextColor(0, 0, 0);
        doc.text('PPM', MARGIN, 13);
        doc.setFontSize(8);
        doc.setFont('helvetica', 'normal');
        doc.text('PLANNING LEADS', MARGIN + 14.5, 13);

        const dateStr = new Date().toLocaleDateString('en-GB', { dateStyle: 'long' });
        doc.setFontSize(8);
        doc.text(dateStr, W - MARGIN, 13, { align: 'right' });

        y = 32;

        // Report title
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(18);
        doc.setTextColor(...BLACK);
        const reportTitle = document.getElementById('reportTitle').textContent;
        doc.text(reportTitle, MARGIN, y);
        y += 7;

        doc.setFont('helvetica', 'normal');
        doc.setFontSize(9);
        doc.setTextColor(...GREY);
        doc.text(document.getElementById('reportMeta').textContent, MARGIN, y);
        y += 10;

        // Stats row boxes
        const leads = window._reportLeads;
        const high  = leads.filter(l => l.priority === 'HIGH').length;
        const med   = leads.filter(l => l.priority === 'MEDIUM').length;
        const low   = leads.filter(l => l.priority === 'LOW').length;
        const councils = [...new Set(leads.map(l => l.council).filter(Boolean))].sort();

        const stats = [
          { label: 'TOTAL LEADS', value: leads.length, color: BRAND },
          { label: 'HIGH PRIORITY', value: high,  color: [74, 222, 128] },
          { label: 'MEDIUM', value: med,  color: [251, 191, 36] },
          { label: 'LOW', value: low,  color: [156, 163, 175] },
          { label: 'COUNCILS', value: councils.length, color: [168, 85, 247] },
        ];
        const bw = CONTENT_W / stats.length;
        stats.forEach((s, i) => {
          const bx = MARGIN + i * bw;
          doc.setDrawColor(...LGREY);
          doc.setFillColor(248, 248, 250);
          doc.roundedRect(bx, y, bw - 2, 18, 2, 2, 'FD');
          doc.setFont('helvetica', 'bold');
          doc.setFontSize(14);
          doc.setTextColor(...s.color);
          doc.text(String(s.value), bx + (bw - 2) / 2, y + 10, { align: 'center' });
          doc.setFont('helvetica', 'normal');
          doc.setFontSize(6.5);
          doc.setTextColor(...GREY);
          doc.text(s.label, bx + (bw - 2) / 2, y + 15.5, { align: 'center' });
        });
        y += 26;

        // ── Per-council sections ────────────────────────────────────
        const byCouncil = {};
        leads.forEach(l => {
          const c = l.council || 'Unknown';
          if (!byCouncil[c]) byCouncil[c] = [];
          byCouncil[c].push(l);
        });
        councils.forEach(c => {
          byCouncil[c].sort((a, b) => (b.score ?? b.opportunity_score ?? 0) - (a.score ?? a.opportunity_score ?? 0));
        });

        councils.forEach(councilName => {
          const cLeads = byCouncil[councilName] || [];

          checkY(18);

          // Council header
          doc.setFillColor(...BRAND);
          doc.rect(MARGIN, y, CONTENT_W, 0.6, 'F');
          y += 4;

          doc.setFont('helvetica', 'bold');
          doc.setFontSize(11);
          doc.setTextColor(...BLACK);
          doc.text(councilName, MARGIN, y);

          const cHigh = cLeads.filter(l => l.priority === 'HIGH').length;
          const cMed  = cLeads.filter(l => l.priority === 'MEDIUM').length;
          doc.setFont('helvetica', 'normal');
          doc.setFontSize(8);
          doc.setTextColor(...GREY);
          doc.text(
            `${cLeads.length} leads  ·  ${cHigh} HIGH  ·  ${cMed} MEDIUM`,
            MARGIN, y + 5
          );
          y += 12;

          // Each lead
          cLeads.forEach((lead, li) => {
            const score    = lead.score ?? lead.opportunity_score ?? '—';
            const pri      = lead.priority || 'LOW';
            const priColor = pri === 'HIGH' ? [74, 222, 128] : pri === 'MEDIUM' ? [251, 191, 36] : [156, 163, 175];
            const desc     = (lead.description || '').slice(0, 280);
            const agentLine = [lead.agent_name, lead.agent_email, lead.agent_phone].filter(Boolean).join('  ·  ');
            const lines  = doc.splitTextToSize(desc, CONTENT_W - 16);
            const needed = 10 + lines.length * 3.8 + (agentLine ? 5 : 0) + 6;

            checkY(needed);

            // Lead card background
            const cardH = needed;
            doc.setFillColor(249, 249, 251);
            doc.setDrawColor(...LGREY);
            doc.roundedRect(MARGIN, y, CONTENT_W, cardH, 2, 2, 'FD');

            // Priority badge
            doc.setFillColor(...priColor.map(v => Math.min(255, v + 160)));
            doc.roundedRect(MARGIN + 3, y + 3, 14, 5, 1, 1, 'F');
            doc.setFont('helvetica', 'bold');
            doc.setFontSize(5.5);
            doc.setTextColor(...priColor.map(v => Math.max(0, v - 80)));
            doc.text(pri, MARGIN + 10, y + 6.5, { align: 'center' });

            // Score
            doc.setFont('helvetica', 'bold');
            doc.setFontSize(11);
            doc.setTextColor(...priColor.map(v => Math.max(0, v - 40)));
            doc.text(`${score}/10`, W - MARGIN - 3, y + 7, { align: 'right' });

            // Address
            doc.setFont('helvetica', 'bold');
            doc.setFontSize(8.5);
            doc.setTextColor(...BLACK);
            const addrLines = doc.splitTextToSize(lead.address || '—', CONTENT_W - 30);
            doc.text(addrLines, MARGIN + 20, y + 7);

            let ly = y + 7 + addrLines.length * 4;

            // App type + date
            const meta = [lead.app_type, lead.start_date].filter(Boolean).join('  ·  ');
            if (meta) {
              doc.setFont('helvetica', 'normal');
              doc.setFontSize(7);
              doc.setTextColor(...GREY);
              doc.text(meta, MARGIN + 3, ly);
              ly += 4;
            }

            // Description
            if (lines.length > 0) {
              doc.setFont('helvetica', 'normal');
              doc.setFontSize(7.5);
              doc.setTextColor(60, 60, 70);
              doc.text(lines, MARGIN + 3, ly);
              ly += lines.length * 3.8;
            }

            // Agent line
            if (agentLine) {
              doc.setFont('helvetica', 'bold');
              doc.setFontSize(7);
              doc.setTextColor(0, 150, 100);
              const agentLines = doc.splitTextToSize(`Contact: ${agentLine}`, CONTENT_W - 6);
              doc.text(agentLines, MARGIN + 3, ly);
              ly += agentLines.length * 3.5;
            }

            // Reference
            if (lead.uid) {
              doc.setFont('helvetica', 'normal');
              doc.setFontSize(6.5);
              doc.setTextColor(...LGREY.map(v => v - 30));
              doc.text(`Ref: ${lead.uid}`, MARGIN + 3, ly + 1);
            }

            y += cardH + 3;
          });

          y += 6; // gap between councils
        });

        // Page numbers
        const pages = doc.getNumberOfPages();
        for (let p = 1; p <= pages; p++) {
          doc.setPage(p);
          doc.setFont('helvetica', 'normal');
          doc.setFontSize(7);
          doc.setTextColor(...GREY);
          doc.text(`Page ${p} of ${pages}`, W / 2, 293, { align: 'center' });
        }

        const filename = (reportTitle || 'ppm-leads').toLowerCase().replace(/[^a-z0-9]+/g, '-') + '.pdf';
        doc.save(filename);

      } catch (err) {
        console.error('PDF error:', err);
        alert('PDF generation failed: ' + err.message);
      } finally {
        if (btn) { btn.innerHTML = '<iconify-icon icon="solar:file-download-bold" style="font-size:13px;"></iconify-icon> Download PDF'; btn.disabled = false; }
      }
    }

    init();
  </script>
</body>
</html>
